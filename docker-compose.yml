services:
  traefik:
    image: traefik:v2.10
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      # Absorbe dinámicamente el puerto del .env (8001 local contra el 80 que será en prod)
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik-net

  homepage:
    container_name: homepage
    build:
      context: ./004_homepage
      dockerfile: Dockerfile
    restart: always
    # ELIMINADO env_file: No requerimos que el servidor estático "Nginx" asimile .envs crudos
    labels:
      - "traefik.enable=true"
      # Magia dinámica: Si la variable falla, fallback brutal a localhost
      - "traefik.http.routers.homepage.rule=Host(`homepage.${DOMAIN_NAME:-localhost}`) || Host(`${DOMAIN_NAME:-localhost}`)"
      - "traefik.http.routers.homepage.entrypoints=web"
    networks:
      - traefik-net

  sentinel-viewer:
    container_name: sentinel_viewer
    build:
      context: ./005_sentinel_viewer
      dockerfile: Dockerfile
    restart: always
    labels:
      - "traefik.enable=true"
      # Subdominio asilado y gobernado dinámicamente:
      - "traefik.http.routers.sentinel.rule=Host(`sentinel.${DOMAIN_NAME:-localhost}`)"
      - "traefik.http.routers.sentinel.entrypoints=web"
    networks:
      - traefik-net

networks:
  traefik-net:
    driver: bridge
